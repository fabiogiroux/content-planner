<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Planner — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#131214;--surface:#1B191D;--surface2:#24212A;--surface3:#332F38;
      --primary:#8B82FF;--pdim:rgba(139,130,255,.12);
      --danger:#F07070;
      --text:#F8FAFC;--muted:#94A3B8;
      --border:rgba(139,130,255,.09);
      --r:12px;--r-sm:8px;
      --glass-bg:rgba(19,18,20,.52);
      --glass-hi:rgba(255,255,255,.09);
      --glass-shine:rgba(255,255,255,.13);
      --glass-blur:blur(22px) saturate(1.7);
    }
    body{
      font-family:'Manrope',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 20%, rgba(139,130,255,.13) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 85% 75%, rgba(96,196,248,.08) 0%, transparent 65%),
        radial-gradient(ellipse 30% 25% at 55% 55%, rgba(91,217,139,.05) 0%, transparent 60%);
    }
    .card{
      position:relative;z-index:1;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-hi);
      box-shadow:inset 0 1px 0 var(--glass-shine),0 8px 40px rgba(0,0,0,.4);
      border-radius:var(--r);
      padding:40px 36px;
      width:100%;max-width:380px;
    }
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
    .logo-mark{width:40px;height:40px;background:var(--primary);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-mark svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .logo-text{display:flex;flex-direction:column;gap:2px}
    .logo-name{font-size:15px;font-weight:800;line-height:1}
    .logo-sub{font-size:11px;color:var(--muted);font-weight:500}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
    input[type=password]{
      width:100%;padding:12px 14px;
      background:rgba(36,33,42,.6);
      border:1px solid var(--glass-hi);
      border-radius:var(--r-sm);
      color:var(--text);font-family:inherit;font-size:14px;font-weight:500;
      outline:none;transition:border-color .2s;
    }
    input[type=password]:focus{border-color:rgba(139,130,255,.4)}
    .btn{
      margin-top:20px;width:100%;
      background:var(--primary);color:#fff;border:none;
      border-radius:var(--r-sm);padding:13px;
      font-family:inherit;font-size:14px;font-weight:700;
      cursor:pointer;transition:opacity .15s;
    }
    .btn:hover{opacity:.85}
    .error{
      margin-top:16px;padding:10px 14px;
      background:rgba(240,112,112,.1);
      border:1px solid rgba(240,112,112,.2);
      border-radius:var(--r-sm);
      color:var(--danger);font-size:13px;font-weight:600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Content Planner</div>
        <div class="logo-sub">Acesso restrito</div>
      </div>
    </div>

    <form method="POST" action="/login">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="Digite a senha" autofocus required>
      <button type="submit" class="btn">Entrar</button>
    </form>

    <div id="err-msg" class="error" style="display:none">Senha incorreta. Tente novamente.</div>
  </div>

  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('err-msg').style.display = 'block';
    }
  </script>
</body>
</html>
