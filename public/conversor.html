<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor HTML → PNG — Content Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#131214;--surface:#1B191D;--surface2:#24212A;--surface3:#332F38;
      --primary:#8B82FF;--pdim:rgba(139,130,255,.12);--pdim2:rgba(139,130,255,.06);
      --success:#5BD98B;--warning:#F0C246;--danger:#F07070;--info:#60C4F8;
      --text:#F8FAFC;--muted:#94A3B8;--muted2:#64748B;
      --border:rgba(139,130,255,.09);--border2:rgba(255,255,255,.06);
      --r:12px;--r-sm:8px;
      --glass-bg:rgba(19,18,20,.52);
      --glass-surface:rgba(27,25,29,.58);
      --glass-hi:rgba(255,255,255,.09);
      --glass-shine:rgba(255,255,255,.13);
      --glass-blur:blur(22px) saturate(1.7);
    }
    body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 20%, rgba(139,130,255,.13) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 85% 75%, rgba(96,196,248,.08) 0%, transparent 65%),
        radial-gradient(ellipse 30% 25% at 55% 55%, rgba(91,217,139,.05) 0%, transparent 60%);
    }
    .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 20px 60px}

    /* Header */
    header{
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border-bottom:1px solid var(--glass-hi);
      box-shadow:inset 0 1px 0 var(--glass-shine),0 4px 24px rgba(0,0,0,.2);
      padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:200;gap:16px;margin-bottom:28px;
    }
    .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
    .logo-mark{width:32px;height:32px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center}
    .logo-mark svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .back-btn{
      display:flex;align-items:center;gap:6px;
      padding:7px 14px;border-radius:var(--r-sm);
      background:rgba(36,33,42,.6);
      backdrop-filter:blur(12px);border:1px solid var(--glass-hi);
      color:var(--muted);font-size:12px;font-weight:700;
      text-decoration:none;transition:all .2s;
    }
    .back-btn:hover{color:var(--text);border-color:rgba(139,130,255,.3)}
    .back-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    h1{font-size:22px;font-weight:800;margin-bottom:4px}
    .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}

    /* Drop zone */
    .dropzone{
      border:2px dashed var(--surface3);
      border-radius:var(--r);padding:48px 24px;
      text-align:center;cursor:pointer;transition:all .2s;
      background:var(--pdim2);
    }
    .dropzone.over{border-color:var(--primary);background:var(--pdim)}
    .dropzone svg{width:40px;height:40px;stroke:var(--primary);fill:none;stroke-width:1.5;margin-bottom:12px}
    .dz-title{font-size:15px;font-weight:700;margin-bottom:6px}
    .dz-sub{font-size:12px;color:var(--muted)}
    #file-input{display:none}

    /* File list */
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:24px 0 10px}
    .file-list{display:flex;flex-direction:column;gap:8px}
    .file-row{
      display:flex;align-items:center;gap:12px;
      padding:12px 16px;border-radius:var(--r-sm);
      background:var(--glass-surface);
      backdrop-filter:blur(12px);
      border:1px solid var(--glass-hi);
    }
    .file-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .file-size{font-size:11px;color:var(--muted);flex-shrink:0}
    .badge{
      padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;
      text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;
    }
    .badge.feed{background:rgba(139,130,255,.15);color:var(--primary)}
    .badge.reels{background:rgba(96,196,248,.15);color:var(--info)}
    .badge.stories{background:rgba(91,217,139,.15);color:var(--success)}
    .badge.custom{background:rgba(255,255,255,.08);color:var(--muted)}
    .dims{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .dim-input{
      width:64px;padding:4px 7px;
      background:rgba(36,33,42,.8);
      border:1px solid var(--glass-hi);border-radius:6px;
      color:var(--text);font-family:inherit;font-size:12px;font-weight:600;
      outline:none;text-align:center;
    }
    .dim-input:focus{border-color:rgba(139,130,255,.4)}
    .dim-sep{color:var(--muted);font-size:12px}
    .file-status{font-size:12px;font-weight:700;flex-shrink:0;min-width:70px;text-align:right}
    .file-status.idle{color:var(--muted2)}
    .file-status.loading{color:var(--warning)}
    .file-status.done{color:var(--success)}
    .file-status.error{color:var(--danger)}
    .btn-remove{
      background:none;border:none;cursor:pointer;
      color:var(--muted2);padding:4px;border-radius:4px;
      transition:color .15s;flex-shrink:0;display:flex;
    }
    .btn-remove:hover{color:var(--danger)}
    .btn-remove svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

    /* Actions */
    .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
    .btn-primary{
      background:var(--primary);color:#fff;border:none;
      border-radius:var(--r-sm);padding:11px 22px;
      font-family:inherit;font-size:13px;font-weight:700;
      cursor:pointer;transition:opacity .15s;display:flex;align-items:center;gap:8px;
    }
    .btn-primary:hover:not(:disabled){opacity:.85}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .btn-secondary{
      background:rgba(36,33,42,.6);
      backdrop-filter:blur(12px);
      border:1px solid var(--glass-hi);
      color:var(--text);border-radius:var(--r-sm);padding:11px 22px;
      font-family:inherit;font-size:13px;font-weight:700;
      cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;
    }
    .btn-secondary:hover:not(:disabled){border-color:rgba(139,130,255,.3)}
    .btn-secondary:disabled{opacity:.45;cursor:not-allowed}

    /* Results */
    .results-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:16px}
    .result-card{
      background:var(--glass-surface);
      backdrop-filter:blur(12px);
      border:1px solid var(--glass-hi);
      border-radius:var(--r);overflow:hidden;
    }
    .result-preview{
      width:100%;aspect-ratio:1/1;object-fit:contain;
      background:#0a0a0b;display:block;
    }
    .result-preview.tall{aspect-ratio:9/16}
    .result-info{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .result-name{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .btn-dl{
      background:var(--pdim);border:1px solid rgba(139,130,255,.2);
      color:var(--primary);border-radius:6px;padding:5px 10px;
      font-family:inherit;font-size:11px;font-weight:700;
      cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
    }
    .btn-dl:hover{background:var(--primary);color:#fff}

    .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}

    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    </div>
    <span>Conversor HTML → PNG</span>
  </div>
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar ao calendário
  </a>
</header>

<div class="wrap">
  <h1>Conversor HTML → PNG</h1>
  <p class="subtitle">Converta arquivos HTML do Claude Designer em imagens prontas para o Instagram.</p>

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="dz-title">Arraste arquivos HTML aqui</div>
    <div class="dz-sub">ou clique para selecionar — até 10 arquivos, 5MB cada</div>
    <input type="file" id="file-input" accept=".html,text/html" multiple>
  </div>

  <!-- File list -->
  <div id="file-list-section" style="display:none">
    <div class="section-title">Arquivos carregados</div>
    <div class="file-list" id="file-list"></div>

    <div class="actions">
      <button class="btn-primary" id="btn-convert" onclick="convertAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Converter todos
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section" style="display:none;margin-top:32px">
    <div class="results-header">
      <div class="section-title" style="margin:0">Resultados</div>
      <button class="btn-secondary" id="btn-zip" onclick="downloadZip()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Baixar todos (ZIP)
      </button>
    </div>
    <div class="results-grid" id="results-grid"></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const files = []; // { id, name, content, width, height, format, status, pngBase64, pngName }

  // ── Format detection ───────────────────────────────────────────────────────
  function detectFormat(name) {
    if (/feed/i.test(name)) return { format: 'feed', label: 'Feed', w: 1080, h: 1080 };
    if (/reels/i.test(name)) return { format: 'reels', label: 'Reels', w: 1080, h: 1920 };
    if (/stor(y|ies)/i.test(name)) return { format: 'stories', label: 'Stories', w: 1080, h: 1920 };
    return { format: 'custom', label: 'Custom', w: 1080, h: 1080 };
  }

  // ── File reading ───────────────────────────────────────────────────────────
  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  async function addFiles(fileList) {
    const existing = files.length;
    const toAdd = Array.from(fileList).slice(0, 10 - existing);
    for (const f of toAdd) {
      if (f.size > 5 * 1024 * 1024) { alert(`${f.name} excede 5MB`); continue; }
      const content = await readFileAsText(f);
      const { format, label, w, h } = detectFormat(f.name);
      files.push({
        id: Date.now() + Math.random(),
        name: f.name,
        size: f.size,
        content,
        width: w,
        height: h,
        format,
        label,
        status: 'idle',
        pngBase64: null,
        pngName: null,
      });
    }
    renderFileList();
  }

  // ── Render file list ───────────────────────────────────────────────────────
  function fmtSize(b) {
    if (b < 1024) return b + 'B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + 'KB';
    return (b/1024/1024).toFixed(1) + 'MB';
  }

  function renderFileList() {
    const section = document.getElementById('file-list-section');
    const list = document.getElementById('file-list');

    if (files.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    list.innerHTML = files.map((f, i) => `
      <div class="file-row" id="row-${i}">
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-size">${fmtSize(f.size)}</span>
        <span class="badge ${f.format}">${f.label}</span>
        <div class="dims">
          <input class="dim-input" type="number" value="${f.width}" min="100" max="4000"
            onchange="files[${i}].width=parseInt(this.value)||1080" title="Largura">
          <span class="dim-sep">×</span>
          <input class="dim-input" type="number" value="${f.height}" min="100" max="4000"
            onchange="files[${i}].height=parseInt(this.value)||1080" title="Altura">
        </div>
        <span class="file-status ${f.status}" id="status-${i}">
          ${f.status === 'idle' ? 'Aguardando' : f.status === 'loading' ? '...' : f.status === 'done' ? 'Pronto' : 'Erro'}
        </span>
        <button class="btn-remove" onclick="removeFile(${i})" title="Remover">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `).join('');
  }

  function removeFile(i) {
    files.splice(i, 1);
    renderFileList();
    if (files.length === 0) document.getElementById('results-section').style.display = 'none';
  }

  // ── Conversion ─────────────────────────────────────────────────────────────
  async function convertAll() {
    if (files.length === 0) return;

    const btn = document.getElementById('btn-convert');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Convertendo...';

    const grid = document.getElementById('results-grid');
    const resultsSection = document.getElementById('results-section');
    grid.innerHTML = '';

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      f.status = 'loading';
      updateStatus(i, 'loading', 'Gerando...');

      try {
        const resp = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ html: f.content, width: f.width, height: f.height, filename: f.name }),
        });
        const data = await resp.json();

        if (data.success) {
          f.status = 'done';
          f.pngBase64 = data.png;
          f.pngName = data.filename;
          updateStatus(i, 'done', 'Pronto');
          appendResult(f);
        } else {
          f.status = 'error';
          updateStatus(i, 'error', 'Erro');
          console.error(`[${f.name}]`, data.error);
        }
      } catch (err) {
        f.status = 'error';
        updateStatus(i, 'error', 'Erro');
        console.error(`[${f.name}]`, err);
      }
    }

    const anyDone = files.some(f => f.status === 'done');
    if (anyDone) resultsSection.style.display = 'block';

    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Converter todos';
  }

  function updateStatus(i, cls, text) {
    const el = document.getElementById(`status-${i}`);
    if (!el) return;
    el.className = `file-status ${cls}`;
    el.textContent = text;
  }

  function appendResult(f) {
    const grid = document.getElementById('results-grid');
    const isTall = f.height > f.width;
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <img src="data:image/png;base64,${f.pngBase64}"
           class="result-preview${isTall ? ' tall' : ''}"
           alt="${f.pngName}">
      <div class="result-info">
        <span class="result-name">${f.pngName}</span>
        <button class="btn-dl" onclick="downloadPng('${f.pngName}', '${f.pngBase64}')">Baixar</button>
      </div>
    `;
    grid.appendChild(card);
  }

  // ── Download individual ────────────────────────────────────────────────────
  function downloadPng(name, base64) {
    const a = document.createElement('a');
    a.href = 'data:image/png;base64,' + base64;
    a.download = name;
    a.click();
  }

  // ── Download ZIP ───────────────────────────────────────────────────────────
  async function downloadZip() {
    const done = files.filter(f => f.status === 'done');
    if (done.length === 0) return;

    const btn = document.getElementById('btn-zip');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,.2);border-top-color:var(--text)"></div> Preparando ZIP...';

    try {
      const items = done.map(f => ({
        html: f.content,
        width: f.width,
        height: f.height,
        filename: f.name,
      }));

      const resp = await fetch('/api/convert-zip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(items),
      });

      if (!resp.ok) throw new Error('Falha ao gerar ZIP');

      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `conversoes-${Date.now()}.zip`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('Erro ao gerar ZIP: ' + err.message);
    }

    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Baixar todos (ZIP)';
  }

  // ── Drag & drop ────────────────────────────────────────────────────────────
  const dz = document.getElementById('dropzone');
  const fi = document.getElementById('file-input');

  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', () => { addFiles(fi.files); fi.value = ''; });

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('over');
    const htmlFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.html') || f.type === 'text/html');
    if (htmlFiles.length) addFiles(htmlFiles);
  });
</script>
</body>
</html>
